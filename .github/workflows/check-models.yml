name: Check Models

on:
  schedule:
    # Run daily at 06:00 UTC to detect model drift early.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run model drift test
        run: bun run test
